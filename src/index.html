<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>DevTools</title>
  <base href="/">
  <!-- Viewport: required for iOS safe areas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.webmanifest">

  <!-- iOS standalone mode -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="DevTools">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Theme color for light/dark modes (status bar / UI hint) -->
  <meta name="theme-color" content="#005B7F" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#001D29" media="(prefers-color-scheme: dark)">

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <!-- Safari pinned tab (macOS) -->
  <link rel="mask-icon" href="apple/safari-pinned-tab.svg" color="#005B7F">

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;900&family=BIZ+UDGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="mat-typography">
  <app-root></app-root>
</body>
</html>
