<app-application-page-template [initialHelpDrawerContent]="ipCidrHelpContent">
  <div class="margin-bottom-16">
    <app-heading headingType="h2">
      <span i18n="@@page.ipCidr.title">IP/CIDR計算機</span>
      <button
        type="button"
        class="right"
        mat-icon-button
        i18n-aria-label="@@page.ipCidr.help.openAriaLabel"
        aria-label="IP/CIDR計算機のヘルプを開く"
        (click)="onOpenHelp(ipCidrHelpContent)">
        <mat-icon>help_outline</mat-icon>
      </button>
    </app-heading>
  </div>
  <app-ip-cidr-input-card
    (calculate)="onCalculate($event)"
  ></app-ip-cidr-input-card>
  <div class="spacer"></div>
  <app-ip-cidr-output-card
    #output
  ></app-ip-cidr-output-card>

  <ng-template #ipCidrHelpContent>
    <app-ip-cidr-help></app-ip-cidr-help>
  </ng-template>
</app-application-page-template>
