<app-application-page-template [initialHelpDrawerContent]="textDiffHelpContent">
  <div class="margin-bottom-16">
    <app-heading headingType="h2">
      <span i18n="@@page.textDiff.title">テキスト比較ツール</span>
      <button
        type="button"
        class="right"
        mat-icon-button
        i18n-aria-label="@@page.textDiff.help.openAriaLabel"
        aria-label="テキスト比較ツールのヘルプを開く"
        (click)="onOpenHelp(textDiffHelpContent)">
        <mat-icon>help_outline</mat-icon>
      </button>
    </app-heading>
  </div>
  <app-text-diff-input-card
    (compare)="onCompare($event)"
    (clear)="onClear()"
  ></app-text-diff-input-card>
  <div class="spacer"></div>
  <app-text-diff-output-card
    #output
  ></app-text-diff-output-card>

  <ng-template #textDiffHelpContent>
    <app-text-diff-help></app-text-diff-help>
  </ng-template>
</app-application-page-template>
