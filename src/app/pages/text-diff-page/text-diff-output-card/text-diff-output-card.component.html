<mat-card appearance="raised">
  <mat-card-content>
    <app-heading headingType="h3" i18n="@@page.textDiff.card.output.heading">比較結果</app-heading>
    @if (result) {
      <div class="split-view">
        <div class="split-pane">
          <div class="pane-label" i18n="@@page.textDiff.card.output.original">比較元</div>
          <div class="text-viewer-table-wrapper">
            <app-text-viewer-table
              [value]="result.originalValue"
              [rowHighlights]="result.originalRowHighlights"
            ></app-text-viewer-table>
          </div>
        </div>
        <div class="split-pane">
          <div class="pane-label" i18n="@@page.textDiff.card.output.modified">比較先</div>
          <div class="text-viewer-table-wrapper">
            <app-text-viewer-table
              [value]="result.modifiedValue"
              [rowHighlights]="result.modifiedRowHighlights"
            ></app-text-viewer-table>
          </div>
        </div>
      </div>
    }
  </mat-card-content>
</mat-card>
