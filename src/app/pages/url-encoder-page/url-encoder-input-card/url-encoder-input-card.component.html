<mat-card appearance="raised">
  @if (formGroup) {
    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()">
      <mat-card-content>
        <app-heading headingType="h3" i18n="@@page.urlEncoder.card.input.heading">入力設定</app-heading>
        <div class="input-section">
          <mat-form-field class="input-field">
            <mat-label i18n="@@page.urlEncoder.card.input.text">変換する文字列</mat-label>
            <input matInput type="text" formControlName="input">
          </mat-form-field>
        </div>
        <div class="options-section">
          <div class="option-group">
            <span class="option-label" i18n="@@page.urlEncoder.card.input.mode">モード</span>
            <mat-radio-group formControlName="mode" aria-label="URL encoder mode">
              <mat-radio-button value="encode" i18n="@@page.urlEncoder.card.input.mode.encode">エンコード</mat-radio-button>
              <mat-radio-button value="decode" i18n="@@page.urlEncoder.card.input.mode.decode">デコード</mat-radio-button>
            </mat-radio-group>
          </div>
          <div class="option-group">
            <span class="option-label" i18n="@@page.urlEncoder.card.input.method">変換方式</span>
            <mat-button-toggle-group formControlName="method" aria-label="URL encoder method">
              <mat-button-toggle value="encodeURIComponent">encodeURIComponent</mat-button-toggle>
              <mat-button-toggle value="encodeURI">encodeURI</mat-button-toggle>
            </mat-button-toggle-group>
          </div>
        </div>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button type="button" (click)="onClear()" i18n="@@page.urlEncoder.card.input.clear">クリア</button>
        <button mat-flat-button color="primary" [disabled]="isInputEmpty" type="submit" i18n="@@page.urlEncoder.card.input.convert">変換</button>
      </mat-card-actions>
    </form>
  }
</mat-card>
