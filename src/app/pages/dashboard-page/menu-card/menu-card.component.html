<mat-nav-list class="list">
  <mat-list>
    @for (item of items; track item.routerLink) {
      <mat-list-item class="item" (click)="onItemClick(item.routerLink)">
        @if (item.svgIcon) {
          <mat-icon matListItemIcon class="icon" [svgIcon]="item.svgIcon"></mat-icon>
        }
        @if (item.icon) {
          <mat-icon matListItemIcon class="icon">{{ item.icon }}</mat-icon>
        }
        <span matListItemTitle>
          <app-hyper-link-text [url]="item.routerLink">{{ item.label }}</app-hyper-link-text>
        </span>
      </mat-list-item>
      <mat-divider></mat-divider>
    }
  </mat-list>
</mat-nav-list>
