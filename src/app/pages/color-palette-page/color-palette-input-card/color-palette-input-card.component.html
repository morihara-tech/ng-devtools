<mat-card appearance="raised">
  <mat-card-content>
    <app-heading headingType="h3">
      <span i18n="@@page.colorPalette.card.input.heading">入力</span>
      <div class="right">
        <mat-button-toggle-group
          class="mode-toggle"
          [value]="mode()"
          (change)="onModeChange($event.value)">
          <mat-button-toggle value="compare">
            <mat-icon>compare</mat-icon>
            <span i18n="@@page.colorPalette.card.input.modeCompare">比較</span>
          </mat-button-toggle>
          <mat-button-toggle value="shades">
            <mat-icon>gradient</mat-icon>
            <span i18n="@@page.colorPalette.card.input.modeShades">濃淡</span>
          </mat-button-toggle>
        </mat-button-toggle-group>
      </div>
    </app-heading>

    <div class="count-slider-wrapper">
      <span class="count-label" i18n="@@page.colorPalette.card.input.countLabel">カラー数</span>
      <div class="slider-container">
        <mat-slider [min]="minCount" [max]="maxCount" [step]="1" discrete>
          <input matSliderThumb [value]="colorCount()" (valueChange)="onCountChange($event)">
        </mat-slider>
        <span class="count-value">{{ colorCount() }}</span>
      </div>
    </div>

    <div class="color-inputs flex wrap">
      @for (control of colorControls; track $index) {
        <mat-form-field class="color-field">
          <mat-label>{{ $index + 1 }}</mat-label>
          <input matInput
            type="text"
            placeholder="#000000"
            [formControl]="control">
          <input type="color"
            matSuffix
            class="color-picker-input"
            [value]="control.value"
            (click)="$event.stopPropagation()"
            (input)="onColorPickerChange($index, $any($event.target).value)">
          @if (control.invalid && control.dirty) {
            <mat-error i18n="@@page.colorPalette.card.input.hexError">有効なHEXカラーコードを入力してください。</mat-error>
          }
        </mat-form-field>
      }
    </div>
  </mat-card-content>
  <mat-card-actions align="end">
    <button mat-flat-button
      [disabled]="hasError"
      (click)="onSubmit()"
      i18n="@@page.colorPalette.card.input.generate">
      生成
    </button>
  </mat-card-actions>
</mat-card>
