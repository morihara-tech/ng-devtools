<app-application-page-template>
  <div class="margin-bottom-16">
    <app-heading headingType="h2">
      <span i18n="@@page.sql.title">SQL整形ツール</span>
      <a
        href="#sql-formatter-help"
        class="right"
        mat-icon-button
        i18n-aria-label="@@page.sql.help.openAriaLabel"
        aria-label="SQL整形ツールの解説へ移動">
        <mat-icon>help_outline</mat-icon>
      </a>
    </app-heading>
  </div>
  <app-sql-formatter-input-card></app-sql-formatter-input-card>

  <section id="sql-formatter-help" class="margin-top-24">
    <div class="margin-bottom-8">
      <app-heading headingType="h3" i18n="@@page.sql.help.sectionTitle">SQL整形ツールについて</app-heading>
    </div>
    <app-sql-formatter-help></app-sql-formatter-help>
  </section>
</app-application-page-template>
