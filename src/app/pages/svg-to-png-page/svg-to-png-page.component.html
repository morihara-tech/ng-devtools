<app-application-page-template [initialHelpDrawerContent]="svgViewerHelpContent">
  <div class="margin-bottom-16">
    <app-heading headingType="h2">
      <span i18n="@@page.svgToPng.title">SVGビューアー</span>
      <button
        type="button"
        class="right"
        mat-icon-button
        i18n-aria-label="@@page.svgToPng.help.openAriaLabel"
        aria-label="SVGビューアーのヘルプを開く"
        (click)="onOpenHelp(svgViewerHelpContent)">
        <mat-icon>help_outline</mat-icon>
      </button>
    </app-heading>
  </div>
  <app-svg-to-png-input-card
    #input
    (settingsChange)="onSettingsChange($event)"
    (svgCodeChange)="onSvgCodeChange($event)"
  ></app-svg-to-png-input-card>
  <div class="spacer"></div>
  <app-svg-to-png-output-card
    #output
  ></app-svg-to-png-output-card>

  <ng-template #svgViewerHelpContent>
    <app-svg-viewer-help></app-svg-viewer-help>
  </ng-template>
</app-application-page-template>
