@if (person(); as p) {
  <button mat-button [matMenuTriggerFor]="menu" class="person-button">
    <span>{{ p.name }}</span>
    <mat-icon class="padding-left">person</mat-icon>
  </button>
  
  <mat-menu #menu="matMenu" xPosition="before">
    @for (menuItem of p.menus; track menuItem.menuId) {
      <button mat-menu-item (click)="clickMenu.emit(menuItem)">
        <mat-icon>{{ menuItem.icon }}</mat-icon>
        <span>{{ menuItem.label }}</span>
      </button>
    }
  </mat-menu> 
}
