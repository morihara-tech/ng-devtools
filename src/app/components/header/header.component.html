@if (model(); as m) {
  <mat-toolbar class="header-toolbar">
    <button mat-icon-button (click)="onToggleMenu()" class="menu">
      <mat-icon>menu</mat-icon>
    </button>
    <div class="separator"></div>
    <a [routerLink]="m.logo.routerLink" class="content">
      <img class="logo" [src]="m.logo.logoUrl">
    </a>
    @if (m.appsButton) {
      <div class="separator"></div>
      <button mat-icon-button [routerLink]="m.appsButton.routerLink" [attr.aria-label]="m.appsButton.label" class="apps content">
        <mat-icon>apps</mat-icon>
      </button>
      <div class="separator"></div>
    }
    <div class="content">
      <span class="title">{{ getTitle() }}</span>
    </div>
    <span class="spacer"></span>
    <app-language-button></app-language-button>
    <app-person-button [person]="m.person" (clickMenu)="clickPersonContext.emit($event)"></app-person-button>
  </mat-toolbar>
}
