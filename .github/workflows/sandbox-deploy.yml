name: Sandbox Deploy (ChatOps)

on:
  issue_comment:
    types: [created]

env:
  NODE_VERSION: 20.19.5
  PROJECT_NAME: ng-devtools

jobs:
  buildanddeploy-sandbox:
    name: Deploy PR to Sandbox
    environment: develop
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/deploy') &&
      (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Add reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Build
        run: yarn run build

      - name: AWS Assume Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole

      - name: Deploy to S3 and Invalidate
        run: |
          aws s3 sync dist/${{ env.PROJECT_NAME }}/browser s3://${{ secrets.S3_BUCKET_NAME }}/pr-${{ github.event.issue.number }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/pr-${{ github.event.issue.number }}/*"

      - name: Notify Success
        if: success()
        uses: actions/github-script@v7
        env:
          TEST_URL_SUFFIX: ${{ vars.TEST_URL_SUFFIX }}
        with:
          script: |
            const prNumber = context.issue.number;
            const testUrlSuffix = process.env.TEST_URL_SUFFIX;
            const url = `https://pr-${prNumber}${testUrlSuffix}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Deployment to the Sandbox environment was successful!**\n\n[Open Sandbox](${url})`
            });

      - name: Notify Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ **Deployment to the Sandbox environment failed.** Please check the Actions logs for details.'
            });
