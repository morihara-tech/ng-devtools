name: Auto Build and Deployment

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  NODE_VERSION: 20.19.5
  PROJECT_NAME: ng-devtools

jobs:
  buildanddeploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: 'Use Node.js ${{ env.NODE_VERSION }}'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: yarn --frozen-lockfile
      - name: AWS Assume Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
      - name: Sync articles content from S3
        run: |
          if [ -n "${{ vars.ARTICLES_BUCKET }}" ]; then
            aws s3 sync "s3://${{ vars.ARTICLES_BUCKET }}/articles/" ./content/articles/
          else
            echo "ARTICLES_BUCKET not set; skipping S3 sync and using local content/ as-is."
          fi
      - name: Build
        run: yarn run build
      - name: Deploy to S3
        run: aws s3 sync dist/${{ env.PROJECT_NAME }}/browser s3://${{ secrets.S3_BUCKET_NAME }} --delete
      - name: CloudFront Invalidation
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
