name: For PR
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

env:
  NODE_VERSION: 20.19.5

jobs:
  check-i18n:
    if: "! github.event.pull_request.draft"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: yarn --frozen-lockfile
      - name: Extract i18n
        run: yarn ng extract-i18n
      - name: Check no new units added to messages.xlf
        run: |
          if ! git diff --exit-code src/resources/texts/def/messages.xlf; then
            echo "::error::New i18n units were found in messages.xlf. Please run 'ng extract-i18n' locally and commit the updated messages.xlf."
            exit 1
          fi
      - name: Check no missing translations in messages.en.xlf
        run: |
          if grep -q '<target/>' src/resources/texts/def/messages.en.xlf; then
            echo "::error::Missing translations found in messages.en.xlf. Please translate all '<target/>' entries."
            exit 1
          fi

  auto-approve:
    needs: check-i18n
    if: "! github.event.pull_request.draft"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - id: create_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.AUTO_APPROVE_APP_ID }}
          private_key: ${{ secrets.AUTO_APPROVE_KEY }}
      - id: get_admin_members
        continue-on-error: true
        run: |
          gh api /orgs/${{ github.repository_owner }}/teams/admin/memberships/${{ github.event.pull_request.user.login }}
        env:
          GH_TOKEN: ${{ steps.create_token.outputs.token }}
      - id: auto_approve_action
        if: steps.get_admin_members.outcome == 'success'
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ steps.create_token.outputs.token }}
